name: Android CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;26.2.11394342" "cmake;3.22.1"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --console=plain

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --console=plain

      - name: Generate lint report
        run: ./gradlew lintDebug --console=plain
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-debug-report
          path: |
            app/build/reports/lint-results-debug.html
            app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt
